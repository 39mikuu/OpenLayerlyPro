name: Restore Drills

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  restore-drills:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Nested-upload restore E2E drill
        run: ./scripts/test-restore-e2e.sh
      - name: Legacy v1 restore E2E drill
        run: ./scripts/test-restore-v1-e2e.sh
      - name: S3/MinIO restore E2E drill
        run: ./scripts/test-restore-s3-e2e.sh
      - name: Clean up drill compose projects
        if: always()
        run: |
          for project in \
            openlayerlypro_s7_source openlayerlypro_s7_restore \
            openlayerlypro_s7_v1_source openlayerlypro_s7_v1_restore \
            openlayerlypro_s7_s3_source openlayerlypro_s7_s3_restore \
            openlayerlypro_s7_s3_restore_fail openlayerlypro_s7_s3_restore_autherr \
            openlayerlypro_s7_s3_restore_secret_mismatch; do
            sudo -n docker compose -p "$project" down -v || true
          done
