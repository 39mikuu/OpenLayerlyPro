name: Apply file reference integrity

on:
  push:
    branches: [fix/file-reference-integrity]

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://artist:artist_password@localhost:5432/artist_member
      RUN_DB_INTEGRATION_TESTS: true
      SESSION_SECRET: ci-file-reference-integrity-session-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: artist_member
          POSTGRES_USER: artist
          POSTGRES_PASSWORD: artist_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U artist -d artist_member"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Apply exact source changes
        run: |
          node scripts/.apply-file-reference-integrity-1.mjs
          node scripts/.apply-file-reference-integrity-2.mjs
          node scripts/.apply-file-reference-integrity-3.mjs
      - run: pnpm install --frozen-lockfile
      - name: Generate and augment migration
        run: |
          pnpm exec drizzle-kit generate --name file_reference_integrity
          node scripts/.augment-file-reference-migration.mjs
      - name: Remove bootstrap-only files
        run: |
          rm scripts/.apply-file-reference-integrity-1.mjs
          rm scripts/.apply-file-reference-integrity-2.mjs
          rm scripts/.apply-file-reference-integrity-3.mjs
          rm scripts/.augment-file-reference-migration.mjs
          rm .github/workflows/apply-file-reference-integrity.yml
      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            src/db/schema/index.ts \
            src/db/migrations/meta/_journal.json \
            src/db/migrations/meta/0020_snapshot.json \
            src/modules/content/index.ts \
            src/modules/content/inline-images.ts \
            src/modules/file/references.ts \
            src/modules/payment/index.ts \
            src/modules/site/index.ts \
            src/modules/site/public-security.ts
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:request-bodies
      - run: pnpm exec tsc --noEmit
      - run: pnpm db:migrate
      - run: pnpm test
      - run: pnpm build:migrator
      - run: pnpm build:files-backfill
      - run: pnpm build:admin-reset
      - run: pnpm build:restore-tools
      - run: pnpm build
      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(files): enforce transactional file reference integrity"
          git push origin HEAD:fix/file-reference-integrity
