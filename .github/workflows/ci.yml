name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://artist:artist_password@localhost:5432/artist_member
      RUN_DB_INTEGRATION_TESTS: true
      SESSION_SECRET: ci-membership-lifecycle-session-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: artist_member
          POSTGRES_USER: artist
          POSTGRES_PASSWORD: artist_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U artist -d artist_member"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:request-bodies
      - run: pnpm exec tsc --noEmit
      - run: pnpm db:migrate
      - name: Run tests and capture output
        run: |
          set +e
          pnpm test > vitest-output.log 2>&1
          status=$?
          echo "$status" > vitest-exit-code.txt
          exit "$status"
      - name: Upload Vitest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: |
            vitest-output.log
            vitest-exit-code.txt
          if-no-files-found: error
      - run: pnpm build:migrator
      - run: pnpm build
