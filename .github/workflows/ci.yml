name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://artist:artist_password@localhost:5432/artist_member
      RUN_DB_INTEGRATION_TESTS: true
      SESSION_SECRET: ci-membership-lifecycle-session-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: artist_member
          POSTGRES_USER: artist
          POSTGRES_PASSWORD: artist_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U artist -d artist_member"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:request-bodies
      - run: pnpm exec tsc --noEmit
      - run: pnpm db:migrate
      - run: pnpm test
      - run: pnpm build:migrator
      - run: pnpm build:files-backfill
      - run: pnpm build:admin-reset
      - run: pnpm build:restore-tools
      - run: pnpm build
      - name: Verify one-off artifacts
        run: |
          node --check dist/migrate.mjs
          node --check dist/files-backfill.mjs
          node --check dist/admin-reset.mjs
          node --check dist/restore-pre-scan.mjs
          node --check dist/restore-neutralize.mjs
          node --check dist/restore-converge.mjs
          node --check dist/restore-schema-check.mjs
      - name: Shellcheck restore scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck \
            scripts/restore-common.sh \
            scripts/backup.sh \
            scripts/restore.sh \
            scripts/test-restore-e2e.sh \
            scripts/test-restore-s3-e2e.sh \
            scripts/test-restore-v1-e2e.sh \
            scripts/test-restore-checksum-gate.sh
      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Prepare browser test database
        env:
          PGPASSWORD: artist_password
        run: |
          createdb --host localhost --username artist artist_member_s6_e2e
          DATABASE_URL=postgresql://artist:artist_password@localhost:5432/artist_member_s6_e2e pnpm db:migrate
      - name: Test browser security policy
        env:
          DATABASE_URL: postgresql://artist:artist_password@localhost:5432/artist_member_s6_e2e
          SESSION_SECRET: ci-s6-browser-session-secret-0123456789
          APP_URL: http://127.0.0.1:3001
          CONFIG_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          SECURITY_CSP_MODE: auto
          UPLOAD_DIR: /tmp/openlayerlypro-s6-e2e-uploads
          E2E_BASE_URL: http://127.0.0.1:3001
        run: pnpm test:e2e
