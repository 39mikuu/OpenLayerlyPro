name: Bug report
description: Report a reproducible bug in OpenLayerlyPro.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, session tokens, SMTP passwords, S3 keys, Stripe secrets, webhook signatures, private payment screenshots, or raw login codes.
        For security vulnerabilities, use GitHub Private Vulnerability Reporting instead of a public issue.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: "Example: v1.0.0-rc, an image digest, or a full commit SHA. While v1.0 is unreleased, prefer the exact main commit."
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Cloudflare Tunnel
        - Reverse proxy / VPS
        - Local development
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, tokens, raw email addresses, payment screenshots, provider payloads, and login codes before posting.
