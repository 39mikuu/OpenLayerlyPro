services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: s7minioadmin
      MINIO_ROOT_PASSWORD: s7minioadmin-secret-0123
    ports:
      - "${S7_S3_MINIO_PORT:-9005}:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 s7minioadmin s7minioadmin-secret-0123 &&
      mc mb --ignore-existing local/openlayerly-s7-e2e
      "
    restart: "no"

  app:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_BUCKET: openlayerly-s7-e2e
      S3_ACCESS_KEY_ID: s7minioadmin
      S3_SECRET_ACCESS_KEY: s7minioadmin-secret-0123
      S3_FORCE_PATH_STYLE: "true"